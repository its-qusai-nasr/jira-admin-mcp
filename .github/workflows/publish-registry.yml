name: Publish to MCP Registry

# Publishes server.json to registry.modelcontextprotocol.io.
# Auth uses GitHub Actions OIDC (no tokens): the repo's OIDC identity proves
# ownership of the io.github.its-qusai-nasr/* namespace. Run manually after a
# PyPI release, and automatically on future version tags.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  publish-registry:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for github-oidc login
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Wait for the matching PyPI release to be live
        # On tag pushes this workflow and publish.yml start together; the
        # registry rejects a version whose PyPI package is not yet published,
        # so poll the version-specific PyPI endpoint before publishing.
        run: |
          VER=$(python3 -c "import json;print(json.load(open('server.json'))['version'])")
          echo "Waiting for jira-admin-mcp $VER on PyPI..."
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/jira-admin-mcp/$VER/json")
            if [ "$code" = "200" ]; then echo "PyPI $VER is live"; exit 0; fi
            echo "  not yet ($i/40, http $code), sleeping 15s"; sleep 15
          done
          echo "Timed out waiting for PyPI $VER"; exit 1

      - name: Login (GitHub Actions OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish
        run: ./mcp-publisher publish
