name: Publish to MCP Registry

# Publishes server.json to registry.modelcontextprotocol.io.
# Auth uses GitHub Actions OIDC (no tokens): the repo's OIDC identity proves
# ownership of the io.github.its-qusai-nasr/* namespace. Run manually after a
# PyPI release, and automatically on future version tags.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  publish-registry:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for github-oidc login
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Login (GitHub Actions OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish
        run: ./mcp-publisher publish
